name: Build desktop apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to bump (e.g. 0.5.5); leave empty to skip bump and build current files.
        required: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

defaults:
  run:
    working-directory: app

jobs:
  bump-main:
    name: Sync version files on main
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout main (writable)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: true

      - name: Extract version
        id: ver
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          V=""
          if [ -n "$INPUT_VERSION" ]; then V="$INPUT_VERSION"; fi
          if [ -z "$V" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then V="${GITHUB_REF_NAME#v}"; fi
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Bump package.json / tauri.conf.json / Cargo.toml / version.txt
        if: steps.ver.outputs.version != ''
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        working-directory: ${{ github.workspace }}
        run: node .github/scripts/bump-version.mjs "$VERSION"

      - name: Commit & push to main
        if: steps.ver.outputs.version != ''
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/package.json app/src-tauri/tauri.conf.json app/src-tauri/Cargo.toml app/version.txt
          git commit -m "chore(release): bump version to ${{ steps.ver.outputs.version }}" || exit 0
          git push origin main

  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_target: x86_64-pc-windows-msvc
            bundles: nsis
            artifact_name: ultragamestudio-windows-x64
            asset_glob: |
              app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          - name: macOS universal
            runner: macos-latest
            rust_target: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_target: universal-apple-darwin
            bundles: app,dmg
            artifact_name: ultragamestudio-macos-universal
            asset_glob: |
              app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          - name: Linux x64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
            artifact_name: ultragamestudio-linux-x64
            asset_glob: |
              app/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              app/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: ver
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          V=""
          if [ -n "$INPUT_VERSION" ]; then V="$INPUT_VERSION"; fi
          if [ -z "$V" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then V="${GITHUB_REF_NAME#v}"; fi
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Bump version files (in-place, no commit)
        if: steps.ver.outputs.version != ''
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        working-directory: ${{ github.workspace }}
        run: node .github/scripts/bump-version.mjs "$VERSION"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
        working-directory: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install dependencies
        run: npm install

      - name: Build CLI and validate bundled workflows
        run: |
          npm run cli:build
          npm run check:built-in-workflows

      - name: Build desktop bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tauri build --target ${{ matrix.platform.tauri_target }} --bundles ${{ matrix.platform.bundles }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.asset_glob }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*

  update-manifest:
    name: Sync version.txt with real asset URLs
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout main (writable)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: true

      - name: Resolve tag name
        id: tag
        working-directory: ${{ github.workspace }}
        run: echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Pull real asset URLs and rewrite version.txt
        working-directory: ${{ github.workspace }}
        run: node .github/scripts/update-manifest.mjs "${{ steps.tag.outputs.name }}"

      - name: Commit & push manifest to main
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/version.txt
          if git diff --cached --quiet; then
            echo "update-manifest: no changes, skipping commit"
            exit 0
          fi
          git commit -m "chore(release): sync version.txt asset URLs for ${{ steps.tag.outputs.name }}"
          git push origin main
